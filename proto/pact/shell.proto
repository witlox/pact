syntax = "proto3";
package pact.shell;

import "google/protobuf/timestamp.proto";

// Remote execution and shell service on pact-agent.
service ShellService {
  // Execute a single command (unary response with streaming output).
  rpc Exec(ExecRequest) returns (stream ExecOutput);

  // Interactive shell session (bidirectional streaming).
  rpc Shell(stream ShellInput) returns (stream ShellOutput);

  // List whitelisted commands for this node's vCluster.
  rpc ListCommands(ListCommandsRequest) returns (ListCommandsResponse);

  // Extend the commit window on this agent.
  rpc ExtendCommitWindow(ExtendWindowRequest) returns (ExtendWindowResponse);

  // Collect diagnostic logs from the node. Server-side filtering.
  // Auth: pact-ops-{vcluster} or pact-platform-admin (LOG1).
  // Sources: dmesg, syslog, supervised service logs.
  rpc CollectDiag(DiagRequest) returns (stream DiagChunk);
}

message ExecRequest {
  string command = 1;
  repeated string args = 2;
  // OIDC token in gRPC metadata (not in message body)
}

message ExecOutput {
  oneof output {
    bytes stdout = 1;
    bytes stderr = 2;
    int32 exit_code = 3;
    string error = 4;  // authorization failure, whitelist rejection, etc.
  }
}

message ShellInput {
  oneof input {
    ShellOpen open = 1;      // start session
    bytes stdin = 2;          // keyboard input
    ShellResize resize = 3;   // terminal resize
    ShellClose close = 4;     // end session
  }
}

message ShellOpen {
  uint32 rows = 1;
  uint32 cols = 2;
  string term = 3;  // TERM environment variable
}

message ShellResize {
  uint32 rows = 1;
  uint32 cols = 2;
}

message ShellClose {}

message ShellOutput {
  oneof output {
    bytes stdout = 1;
    string session_id = 2;   // returned on session start
    string error = 3;
    int32 exit_code = 4;     // on session end
  }
}

message ListCommandsRequest {}

message ListCommandsResponse {
  repeated CommandEntry commands = 1;
}

message CommandEntry {
  string command = 1;
  bool state_changing = 2;
  string description = 3;
}

message ExtendWindowRequest {
  uint32 additional_minutes = 1;
}

message ExtendWindowResponse {
  bool success = 1;
  uint32 new_deadline_seconds = 2;  // seconds until new deadline
  optional string error = 3;
}

// --- Diagnostic log retrieval (LOG1-LOG3) ---

message DiagRequest {
  string source_filter = 1;     // "system", "service", "all" (default: "all")
  string service_name = 2;      // specific service (empty = all services)
  string grep_pattern = 3;      // server-side grep (empty = no filter)
  uint32 line_limit = 4;        // max lines per source (0 = default 100, max 10000)
}

message DiagChunk {
  string source = 1;            // "dmesg", "syslog", "service:nvidia-persistenced", etc.
  repeated string lines = 2;    // batch of log lines
  bool truncated = 3;           // true if hit line_limit for this source
}
