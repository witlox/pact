syntax = "proto3";
package pact.stream;

import "google/protobuf/timestamp.proto";

service BootConfigService {
  rpc StreamBootConfig(BootConfigRequest) returns (stream ConfigChunk);
  rpc SubscribeConfigUpdates(SubscribeRequest) returns (stream ConfigUpdate);
}

message BootConfigRequest {
  string node_id = 1;
  string vcluster_id = 2;
  optional uint64 last_known_version = 3;
}

message ConfigChunk {
  oneof chunk {
    OverlayChunk base_overlay = 1;
    NodeDelta node_delta = 2;
    ConfigComplete complete = 3;
  }
}

message OverlayChunk {
  uint64 version = 1;
  string vcluster_id = 2;
  bytes data = 3;
  uint32 chunk_index = 4;
  uint32 total_chunks = 5;
  string checksum = 6;
}

message NodeDelta {
  string node_id = 1;
  uint64 version = 2;
  bytes data = 3;
  string checksum = 4;
}

message ConfigComplete {
  uint64 base_version = 1;
  uint64 node_version = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message SubscribeRequest {
  string node_id = 1;
  string vcluster_id = 2;
  uint64 from_sequence = 3;
}

message ConfigUpdate {
  uint64 sequence = 1;
  google.protobuf.Timestamp timestamp = 2;
  oneof update {
    bytes vcluster_change = 3;
    bytes node_change = 4;
    bytes policy_change = 5;
    bytes blacklist_change = 6;
  }
}
