name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - name: Compute version
        id: version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --exclude pact-acceptance --exclude pact-e2e --run-ignored all
      - run: cargo test -p pact-acceptance
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # Platform binaries: journal, CLI, MCP — no hardware features, one per arch
  # ---------------------------------------------------------------------------
  platform:
    name: Platform (${{ matrix.arch }})
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            cross: false
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          key: platform-${{ matrix.arch }}

      - name: Install cross-compilation toolchain
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh

      - name: Build pact-journal
        run: cargo build --release --target ${{ matrix.target }} -p pact-journal

      - name: Build pact (CLI)
        run: cargo build --release --target ${{ matrix.target }} -p pact-cli

      - name: Build pact-mcp
        run: cargo build --release --target ${{ matrix.target }} -p pact-mcp

      - name: Package
        run: |
          mkdir -p dist
          for bin in pact pact-journal pact-mcp; do
            cp "target/${{ matrix.target }}/release/$bin" "dist/$bin"
          done
          cd dist
          tar czf "../pact-platform-${{ matrix.arch }}.tar.gz" *
          cd ..
          sha256sum "pact-platform-${{ matrix.arch }}.tar.gz" > "pact-platform-${{ matrix.arch }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: pact-platform-${{ matrix.arch }}
          path: |
            pact-platform-${{ matrix.arch }}.tar.gz
            pact-platform-${{ matrix.arch }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Agent binaries: arch × GPU × supervisor matrix
  # ---------------------------------------------------------------------------
  agent:
    name: Agent (${{ matrix.name }})
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- x86_64 × PactSupervisor ---
          - name: x86_64-pact
            target: x86_64-unknown-linux-gnu
            features: ebpf,spire
            cross: false
          - name: x86_64-nvidia-pact
            target: x86_64-unknown-linux-gnu
            features: ebpf,spire,nvidia
            cross: false
          - name: x86_64-amd-pact
            target: x86_64-unknown-linux-gnu
            features: ebpf,spire,amd
            cross: false

          # --- x86_64 × systemd ---
          - name: x86_64-systemd
            target: x86_64-unknown-linux-gnu
            features: ebpf,spire,systemd
            cross: false
          - name: x86_64-nvidia-systemd
            target: x86_64-unknown-linux-gnu
            features: ebpf,spire,nvidia,systemd
            cross: false
          - name: x86_64-amd-systemd
            target: x86_64-unknown-linux-gnu
            features: ebpf,spire,amd,systemd
            cross: false

          # --- aarch64 × PactSupervisor ---
          - name: aarch64-pact
            target: aarch64-unknown-linux-gnu
            features: ebpf,spire
            cross: true
          - name: aarch64-nvidia-pact
            target: aarch64-unknown-linux-gnu
            features: ebpf,spire,nvidia
            cross: true

          # --- aarch64 × systemd ---
          - name: aarch64-systemd
            target: aarch64-unknown-linux-gnu
            features: ebpf,spire,systemd
            cross: true
          - name: aarch64-nvidia-systemd
            target: aarch64-unknown-linux-gnu
            features: ebpf,spire,nvidia,systemd
            cross: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-${{ matrix.name }}

      - name: Install cross-compilation toolchain
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh

      - name: Build pact-agent
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p pact-agent --features ${{ matrix.features }}

      - name: Package
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/pact-agent" dist/
          cd dist
          tar czf "../pact-agent-${{ matrix.name }}.tar.gz" *
          cd ..
          sha256sum "pact-agent-${{ matrix.name }}.tar.gz" > "pact-agent-${{ matrix.name }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: pact-agent-${{ matrix.name }}
          path: |
            pact-agent-${{ matrix.name }}.tar.gz
            pact-agent-${{ matrix.name }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Publish: collect all artifacts into a GitHub release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [preflight, platform, agent]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: pact v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          body: |
            ## Platform binaries (journal, CLI, MCP)

            | Archive | Arch | Contents |
            |---------|------|----------|
            | `pact-platform-x86_64` | x86_64 | pact, pact-journal (opa + federation), pact-mcp |
            | `pact-platform-aarch64` | aarch64 | pact, pact-journal (opa + federation), pact-mcp |

            ## Agent binaries

            | Archive | Arch | GPU | Supervisor | Features |
            |---------|------|-----|------------|----------|
            | `pact-agent-x86_64-pact` | x86_64 | — | PactSupervisor | ebpf, spire |
            | `pact-agent-x86_64-nvidia-pact` | x86_64 | NVIDIA | PactSupervisor | ebpf, spire, nvidia |
            | `pact-agent-x86_64-amd-pact` | x86_64 | AMD | PactSupervisor | ebpf, spire, amd |
            | `pact-agent-x86_64-systemd` | x86_64 | — | systemd | ebpf, spire, systemd |
            | `pact-agent-x86_64-nvidia-systemd` | x86_64 | NVIDIA | systemd | ebpf, spire, nvidia, systemd |
            | `pact-agent-x86_64-amd-systemd` | x86_64 | AMD | systemd | ebpf, spire, amd, systemd |
            | `pact-agent-aarch64-pact` | aarch64 | — | PactSupervisor | ebpf, spire |
            | `pact-agent-aarch64-nvidia-pact` | aarch64 | NVIDIA | PactSupervisor | ebpf, spire, nvidia |
            | `pact-agent-aarch64-systemd` | aarch64 | — | systemd | ebpf, spire, systemd |
            | `pact-agent-aarch64-nvidia-systemd` | aarch64 | NVIDIA | systemd | ebpf, spire, nvidia, systemd |
          files: |
            pact-platform-*/pact-platform-*.tar.gz
            pact-platform-*/pact-platform-*.tar.gz.sha256
            pact-agent-*/pact-agent-*.tar.gz
            pact-agent-*/pact-agent-*.tar.gz.sha256
