name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - name: Compute version
        id: version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --exclude pact-acceptance --exclude pact-e2e --run-ignored all
      - run: cargo test -p pact-acceptance
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # Platform binaries: journal, CLI, MCP — no hardware features, one per arch
  # Rocky 9 container: glibc 2.34, kernel 5.14 headers (RHEL 9 baseline)
  # ---------------------------------------------------------------------------
  platform:
    name: Platform (${{ matrix.arch }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux:9
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y --allowerasing gcc gcc-c++ openssl-devel pkgconf-pkg-config \
            perl-IPC-Cmd git curl unzip tar gzip make findutils

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          key: platform-${{ matrix.arch }}

      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh

      - name: Build pact-journal
        run: cargo build --release -p pact-journal

      - name: Build pact (CLI)
        run: cargo build --release -p pact-cli

      - name: Build pact-mcp
        run: cargo build --release -p pact-mcp

      - name: Package
        run: |
          mkdir -p dist
          for bin in pact pact-journal pact-mcp; do
            cp "target/release/$bin" "dist/$bin"
          done
          cd dist
          tar czf "../pact-platform-${{ matrix.arch }}.tar.gz" *
          cd ..
          sha256sum "pact-platform-${{ matrix.arch }}.tar.gz" > "pact-platform-${{ matrix.arch }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: pact-platform-${{ matrix.arch }}
          path: |
            pact-platform-${{ matrix.arch }}.tar.gz
            pact-platform-${{ matrix.arch }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Agent binaries: arch × supervisor (GPU backends included in all builds)
  # Rocky 9 container: glibc 2.34, kernel 5.14 headers (RHEL 9 baseline)
  # Native builds per arch — no cross-compilation needed
  # GPU detection is runtime: nvidia-smi/rocm-smi absent → empty list, no error
  # ---------------------------------------------------------------------------
  agent:
    name: Agent (${{ matrix.name }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux:9
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-pact
            features: ebpf,spire,nvidia,amd
            runner: ubuntu-latest
          - name: x86_64-systemd
            features: ebpf,spire,nvidia,amd,systemd
            runner: ubuntu-latest
          - name: aarch64-pact
            features: ebpf,spire,nvidia
            runner: ubuntu-24.04-arm
          - name: aarch64-systemd
            features: ebpf,spire,nvidia,systemd
            runner: ubuntu-24.04-arm

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y --allowerasing gcc gcc-c++ openssl-devel pkgconf-pkg-config \
            perl-IPC-Cmd git curl unzip tar gzip make findutils

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-${{ matrix.name }}

      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh

      - name: Build pact-agent
        run: >
          cargo build --release
          -p pact-agent --features ${{ matrix.features }}

      - name: Package
        run: |
          mkdir -p dist
          cp "target/release/pact-agent" dist/
          cd dist
          tar czf "../pact-agent-${{ matrix.name }}.tar.gz" *
          cd ..
          sha256sum "pact-agent-${{ matrix.name }}.tar.gz" > "pact-agent-${{ matrix.name }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: pact-agent-${{ matrix.name }}
          path: |
            pact-agent-${{ matrix.name }}.tar.gz
            pact-agent-${{ matrix.name }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Publish: collect all artifacts into a GitHub release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [preflight, platform, agent]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: pact v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          body: |
            Built on Rocky Linux 9 (glibc 2.34, kernel 5.14) — compatible with
            RHEL 9+, Rocky 9+, AlmaLinux 9+, Ubuntu 22.04+, Debian 12+, SLES 15 SP4+.

            ## Platform binaries (journal, CLI, MCP)

            | Archive | Arch | Contents |
            |---------|------|----------|
            | `pact-platform-x86_64` | x86_64 | pact, pact-journal (opa + federation), pact-mcp |
            | `pact-platform-aarch64` | aarch64 | pact, pact-journal (opa + federation), pact-mcp |

            ## Agent binaries

            All agent binaries include NVIDIA and AMD GPU detection (runtime — gracefully
            reports no GPUs when vendor tools are absent).

            | Archive | Arch | Supervisor | Features |
            |---------|------|------------|----------|
            | `pact-agent-x86_64-pact` | x86_64 | PactSupervisor | ebpf, spire, nvidia, amd |
            | `pact-agent-x86_64-systemd` | x86_64 | systemd | ebpf, spire, nvidia, amd, systemd |
            | `pact-agent-aarch64-pact` | aarch64 | PactSupervisor | ebpf, spire, nvidia |
            | `pact-agent-aarch64-systemd` | aarch64 | systemd | ebpf, spire, nvidia, systemd |
          files: |
            pact-platform-*/pact-platform-*.tar.gz
            pact-platform-*/pact-platform-*.tar.gz.sha256
            pact-agent-*/pact-agent-*.tar.gz
            pact-agent-*/pact-agent-*.tar.gz.sha256
