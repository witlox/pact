name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - name: Compute version
        id: version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --run-ignored all
      - run: cargo deny check

  build:
    name: Build (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh
      - name: Build release
        run: cargo build --workspace --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: pact-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/pact
            target/${{ matrix.target }}/release/pact-agent
            target/${{ matrix.target }}/release/pact-journal

  publish:
    name: Publish release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: pact v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          files: |
            pact-*/pact
            pact-*/pact-agent
            pact-*/pact-journal
