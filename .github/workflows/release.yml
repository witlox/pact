name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - name: Compute version
        id: version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --run-ignored all
      - run: cargo deny check

  build:
    name: Build ${{ matrix.name }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- x86_64 (diskless HPC nodes, PactSupervisor) ---
          - name: x86_64-nvidia
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            agent_features: ebpf,spire,nvidia
            journal_features: opa
            cross: false

          - name: x86_64-amd
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            agent_features: ebpf,spire,amd
            journal_features: opa
            cross: false

          # --- aarch64 (diskless HPC nodes, PactSupervisor) ---
          - name: aarch64-nvidia
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            agent_features: ebpf,spire,nvidia
            journal_features: opa
            cross: true

          # --- systemd fallback (conservative deployments) ---
          - name: x86_64-systemd
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            agent_features: ebpf,spire,nvidia,systemd
            journal_features: opa
            cross: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Install cross-compilation toolchain
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh

      # Build each binary with its features
      - name: Build pact-agent
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p pact-agent --features ${{ matrix.agent_features }}

      - name: Build pact-journal
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p pact-journal --features ${{ matrix.journal_features }}

      - name: Build pact (CLI)
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p pact-cli

      - name: Build pact-mcp
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p pact-mcp

      # Package binaries
      - name: Package
        run: |
          mkdir -p dist
          for bin in pact pact-agent pact-journal pact-mcp; do
            cp "target/${{ matrix.target }}/release/$bin" "dist/$bin" 2>/dev/null || true
          done
          cd dist
          tar czf "../pact-${{ matrix.name }}.tar.gz" *
          cd ..
          sha256sum "pact-${{ matrix.name }}.tar.gz" > "pact-${{ matrix.name }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: pact-${{ matrix.name }}
          path: |
            pact-${{ matrix.name }}.tar.gz
            pact-${{ matrix.name }}.tar.gz.sha256

  publish:
    name: Publish release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: pact v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          body: |
            ## Build variants

            | Archive | Target | Supervisor | Agent features |
            |---------|--------|------------|----------------|
            | `pact-x86_64-nvidia` | x86_64 | PactSupervisor | ebpf, spire, nvidia |
            | `pact-x86_64-amd` | x86_64 | PactSupervisor | ebpf, spire, amd |
            | `pact-aarch64-nvidia` | aarch64 | PactSupervisor | ebpf, spire, nvidia |
            | `pact-x86_64-systemd` | x86_64 | systemd fallback | ebpf, spire, nvidia, systemd |

            All journal builds include OPA policy evaluation.

            Each tarball contains: `pact` (CLI), `pact-agent`, `pact-journal`, `pact-mcp`.
          files: |
            pact-*/pact-*.tar.gz
            pact-*/pact-*.tar.gz.sha256
