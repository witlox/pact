name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "specs/**"
      - "*.md"
      - "config/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "specs/**"
      - "*.md"
      - "config/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

# Stage 1: fast gates (fmt, clippy, deny)
# Stage 2: feature flag compilation checks
# Stage 3: test suites (unit, bdd, e2e, linux-privileged)
# Stage 4: coverage

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — fast checks, gate everything
  # ---------------------------------------------------------------------------

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # Stage 2 — feature flag compilation (needs stage 1)
  # ---------------------------------------------------------------------------

  feature-check:
    name: Feature Check (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [fmt, clippy, deny]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-spire
            cmd: cargo check -p pact-agent --features spire
          - name: agent-ebpf
            cmd: cargo check -p pact-agent --features ebpf
          - name: agent-nvidia
            cmd: cargo check -p pact-agent --features nvidia
          - name: agent-amd
            cmd: cargo check -p pact-agent --features amd
          - name: agent-systemd
            cmd: cargo check -p pact-agent --features systemd
          - name: agent-all
            cmd: cargo check -p pact-agent --features ebpf,spire,nvidia,systemd
          - name: journal-all
            cmd: cargo check -p pact-journal --all-features
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
        with:
          key: features-${{ matrix.name }}
      - run: ${{ matrix.cmd }}

  # ---------------------------------------------------------------------------
  # Stage 3 — test suites (needs stage 2)
  # ---------------------------------------------------------------------------

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [feature-check]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --exclude pact-acceptance --exclude pact-e2e

  acceptance:
    name: BDD Acceptance
    runs-on: ubuntu-latest
    needs: [feature-check]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p pact-acceptance

  e2e:
    name: E2E Integration
    runs-on: ubuntu-latest
    needs: [feature-check]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p pact-e2e -- --test-threads=1

  linux-privileged:
    name: Linux Privileged Tests (cgroup, OOM)
    runs-on: ubuntu-latest
    needs: [feature-check]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y squashfs-tools
      - run: sudo env "PATH=$PATH" cargo test -p pact-e2e --test linux_cgroup --test linux_namespace -- --ignored --test-threads=1

  # ---------------------------------------------------------------------------
  # Stage 4 — coverage (needs stage 3)
  # ---------------------------------------------------------------------------

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test, acceptance, e2e, linux-privileged]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: >
          cargo llvm-cov --workspace
          --exclude pact-test-harness
          --exclude pact-acceptance
          --exclude pact-e2e
          --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
