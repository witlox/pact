[workspace]
resolver = "2"
members = [
    "crates/pact-common",
    "crates/pact-agent",
    "crates/pact-journal",
    "crates/pact-policy",
    "crates/pact-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/witlox/pact"
rust-version = "1.85"

[workspace.dependencies]
tokio = { version = "1", features = ["full", "process", "signal"] }
tonic = { version = "0.12", features = ["tls"] }
tonic-build = "0.12"
prost = "0.13"
prost-types = "0.13"
openraft = { version = "0.10", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
clap = { version = "4", features = ["derive"] }
aya = "0.13"
aya-log = "0.2"
nix = { version = "0.29", features = ["inotify", "net", "mount", "socket", "process", "signal"] }
rustls = "0.23"
rcgen = "0.13"
jsonwebtoken = "9"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
prometheus = "0.13"
zstd = "0.13"
thiserror = "2"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
proptest = "1"
cucumber = "0.21"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"
