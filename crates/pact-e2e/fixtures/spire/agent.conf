agent {
    data_dir = "/opt/spire/data/agent"
    log_level = "WARN"
    trust_domain = "pact.test"
    server_address = "spire-server"
    server_port = "8081"

    socket_path = "/tmp/spire-agent/agent.sock"
    insecure_bootstrap = true
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "memory" {
        plugin_data {}
    }

    WorkloadAttestor "unix" {
        plugin_data {}
    }
}
