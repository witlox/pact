[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC",
         "Unicode-3.0", "Unicode-DFS-2016", "Zlib"]
confidence-threshold = 0.8
copyleft = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
