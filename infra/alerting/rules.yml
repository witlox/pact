# pact alerting rules (Grafana or Prometheus Alertmanager)
groups:
  - name: pact-critical
    rules:
      - alert: PactJournalQuorumLoss
        expr: count(pact_journal_raft_leader == 1) < 1
        for: 1m
        labels: { severity: critical }
      - alert: PactStaleEmergency
        expr: pact_emergency_sessions_stale > 0
        for: 0s
        labels: { severity: critical }
  - name: pact-warning
    rules:
      - alert: PactHighDriftRate
        expr: rate(pact_journal_events_total{type="drift_detected"}[1h]) > 100
        for: 5m
        labels: { severity: warning }
      - alert: PactBootConfigSlow
        expr: histogram_quantile(0.99, rate(pact_journal_boot_delivery_seconds_bucket[5m])) > 10
        for: 2m
        labels: { severity: warning }
      - alert: PactServiceFailures
        expr: rate(pact_supervisor_restart_total[5m]) > 5
        for: 5m
        labels: { severity: warning }
