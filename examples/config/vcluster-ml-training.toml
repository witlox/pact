# vCluster overlay — ML training cluster
#
# This is a declarative TOML spec that defines the desired state
# for all nodes in the ml-training vCluster. Apply with:
#
#   pact apply examples/config/vcluster-ml-training.toml

[vcluster.ml-training]

# --- Kernel parameters ---

[vcluster.ml-training.sysctl]
"vm.nr_hugepages" = "1024"
"vm.swappiness" = "10"
"net.core.rmem_max" = "16777216"
"net.core.wmem_max" = "16777216"

# --- Kernel modules ---

[vcluster.ml-training.modules]
load = ["nvidia", "nvidia_uvm", "nfs", "cxi_core"]

# --- Mount points ---

[vcluster.ml-training.mounts]
"/datasets" = { type = "nfs", source = "storage02:/shared-datasets", read_only = true }
"/scratch" = { type = "nfs", source = "storage03:/scratch" }

# --- Services ---

[[vcluster.ml-training.services]]
name = "chronyd"
binary = "/usr/sbin/chronyd"
order = 1
restart = "always"
restart_delay_seconds = 5
cgroup_slice = "pact.slice/infra"

[[vcluster.ml-training.services]]
name = "nvidia-persistenced"
binary = "/usr/bin/nvidia-persistenced"
order = 2
restart = "always"
restart_delay_seconds = 5
cgroup_slice = "pact.slice/gpu"

[[vcluster.ml-training.services]]
name = "lattice-node-agent"
binary = "/usr/bin/lattice-node-agent"
order = 10
restart = "always"
restart_delay_seconds = 10
depends_on = ["chronyd"]
cgroup_slice = "workload"

# --- Policy ---

[vcluster.ml-training.policy]
drift_sensitivity = 2.0
base_commit_window_seconds = 900
two_person_approval = false
